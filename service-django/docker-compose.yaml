services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: inmobilaria_django
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "9775137"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_vol:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_vol:
