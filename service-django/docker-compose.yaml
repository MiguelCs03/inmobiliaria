services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: inmobilaria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "9775137"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ml_models_vol:/app/ml_models/trained
      - media_vol:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info -c 2
    env_file: .env
    volumes:
      - .:/app
      - ml_models_vol:/app/ml_models/trained
      - media_vol:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  ml_models_vol:
  media_vol:
