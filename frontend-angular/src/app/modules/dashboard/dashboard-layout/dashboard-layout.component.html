<div class="dashboard-container">
  <!-- Backdrop for user menu -->
  <div class="dropdown-backdrop" *ngIf="userMenuOpen" (click)="closeUserMenu()"></div>
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-brand">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      
      <a [routerLink]="getDashboardRoute()" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
        </svg>
        <span>Dashboard</span>
        <span class="badge" *ngIf="userRole === 1">Admin</span>
        <span class="badge agent" *ngIf="userRole === 2">Agente</span>
      </a>

      <div class="nav-section-title">Módulos de Gestión</div>

      <a [routerLink]="userRole === 1 ? '/admin/propietarios' : '/agente/propietarios'" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span>Propietarios</span>
      </a>

      <a [routerLink]="userRole === 1 ? '/admin/propiedades' : '/agente/propiedades'" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
        <span>Casas / Inmuebles</span>
      </a>
    </nav>
  </aside>
  <button class="sidebar-toggle" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Mostrar menú' : 'Ocultar menú'">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <!-- Main Content Panel -->
  <main class="main-content">
    <header class="top-header">
      <div class="header-search">
        <h2>Panel de Operaciones</h2>
      </div>
      <div class="header-actions">
        <button class="header-icon-btn" title="Notificaciones">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
          </svg>
        </button>
        <button class="header-icon-btn" (click)="toggleTheme()" [title]="isDarkMode ? 'Modo claro' : 'Modo oscuro'">
          <!-- Icono de Sol (Modo Claro) -->
          <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.93 4.93l1.59 1.59m10.96 10.96l1.59 1.59M3 12h2.25m13.5 0H21M5.75 12a6.25 6.25 0 1112.5 0 6.25 6.25 0 01-12.5 0zM4.93 19.07l1.59-1.59m10.96-10.96l1.59-1.59" />
          </svg>
          <!-- Icono de Luna (Modo Oscuro) -->
          <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
        </button>
        <div class="header-user" (click)="toggleUserMenu()">
          <div class="header-avatar">
            <img *ngIf="userPhoto" [src]="userPhoto" class="avatar-img" alt="Foto Perfil" />
            <span *ngIf="!userPhoto">{{ userName.charAt(0) }}</span>
          </div>
          <span class="header-user-name">{{ userName }}</span>
          <svg class="header-chevron" [class.open]="userMenuOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
          <!-- Menú Desplegable del Perfil en la Cabecera -->
          <div class="user-dropdown" *ngIf="userMenuOpen" (click)="$event.stopPropagation()">
            <div class="dropdown-header">
              <span class="dropdown-user-name">{{ userName }}</span>
              <span class="dropdown-user-email">{{ userEmailDisplay }}</span>
            </div>
            <div class="dropdown-item" [routerLink]="userRole === 1 ? '/admin/perfil' : '/agente/perfil'" (click)="closeUserMenu()">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
              <span>Mi Perfil</span>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item dropdown-item-danger" (click)="logout()">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
              </svg>
              <span>Cerrar Sesión</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Router outlet for nested modules -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
