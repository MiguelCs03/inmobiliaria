services:

  service-go:
    build: ./service-go
    container_name: service-go
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - dynamodb

  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb"
    ports:
      - "8000:8000"