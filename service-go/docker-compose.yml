services:

  service-go:
    build: ./service-go
    ports:
      - "${APP_PORT}:3000"
    container_name: service-go
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"